<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>WhiteVine — 약관 및 정책</title>
<meta name="description" content="WhiteVine 의 이용약관 및 개인정보처리방침">
<style>
:root { color-scheme: light dark; }
* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Pretendard", "Apple SD Gothic Neo", system-ui, sans-serif;
  font-size: 16px; line-height: 1.7; color: #1a1a1a; background: #ffffff;
}
@media (prefers-color-scheme: dark) {
  html, body { color: #e8e8e8; background: #121212; }
  a { color: #5aa9ff; }
  .card { border-color: #333; background: #1a1a1a; }
}
.container { max-width: 720px; margin: 0 auto; padding: 64px 24px; }
h1 { font-size: 32px; font-weight: 700; margin: 0 0 8px; letter-spacing: -0.5px; }
.subtitle { color: #777; margin: 0 0 48px; font-size: 16px; }
@media (prefers-color-scheme: dark) { .subtitle { color: #999; } }
.card {
  display: block; padding: 20px 24px; margin: 12px 0;
  border: 1px solid #e5e5e5; border-radius: 12px;
  text-decoration: none; color: inherit;
  transition: border-color 0.15s;
}
.card:hover { border-color: #999; }
.card-title { font-weight: 600; font-size: 18px; margin: 0 0 4px; }
.card-desc { color: #777; font-size: 14px; margin: 0; }
@media (prefers-color-scheme: dark) { .card-desc { color: #aaa; } }
footer { margin-top: 64px; padding-top: 24px; border-top: 1px solid #e5e5e5; color: #777; font-size: 13px; text-align: center; }
@media (prefers-color-scheme: dark) { footer { border-top-color: #333; color: #888; } }
</style>
</head>
<body>
<main class="container">
  <h1>WhiteVine</h1>
  <p class="subtitle">약관 및 정책</p>

  <a class="card" href="/whitevine/terms">
    <p class="card-title">이용약관</p>
    <p class="card-desc">서비스 이용에 관한 약관</p>
  </a>

  <a class="card" href="/whitevine/privacy">
    <p class="card-title">개인정보처리방침</p>
    <p class="card-desc">개인정보 수집·이용·보관에 관한 방침</p>
  </a>

  <footer>
    <p>운영자 나노청포도 · 연락처 report@thelayerhq.com</p>
    <p>© 2026 WhiteVine. All rights reserved.</p>
  </footer>
</main>
</body>
</html>
